<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Bot SII Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* Contenedores Principales */
        .container { width: 100%; max-width: 450px; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        /* Tipografía y Elementos */
        h2 { margin-bottom: 20px; font-size: 24px; text-align: center; color: #0f172a; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; }
        input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        
        /* Botones */
        button { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        
        /* Alertas y Estado */
        .alert { padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; text-align: center; }
        .alert-error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .alert-success { background-color: #dcfce7; color: #166534; border: 1px solid #86efac; }
        
        /* Estilos del Panel (Dashboard) */
        .panel-box { max-width: 800px; width: 100%; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
        .card { background: var(--card-bg); pading: 20px; border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
        .log-box { background: #0f172a; color: #38bdf8; font-family: monospace; padding: 15px; border-radius: 6px; height: 150px; overflow-y: auto; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="login-section" class="container">
        <h2>Bot SII - Iniciar Sesión</h2>
        <div id="login-alert" class="alert hidden"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="rut">RUT Empresa / Usuario</label>
                <input type="text" id="rut" placeholder="12345678-9" required>
            </div>
            <div class="form-group">
                <label for="password">Clave SII</label>
                <input type="password" id="password" placeholder="Tu clave tributaria" required>
            </div>
            <button type="submit" id="btn-login">Ingresar al Panel</button>
        </form>
    </div>

    <div id="panel-section" class="container panel-box hidden">
        <h2>Panel de Control Automatizado</h2>
        <div id="panel-alert" class="alert hidden"></div>
        
        <div class="card">
            <h3>Control del Robot</h3>
            <p style="margin: 8px 0; color: #64748b; font-size: 14px;">Presiona el botón para abrir el navegador interno en el servidor y extraer los libros del mes.</p>
            <button id="btn-run-bot" style="background-color: #10b981;">▶ Ejecutar Bot SII Ahora</button>
        </div>

        <div class="grid">
            <div class="card">
                <h4>Último RUT Consultado</h4>
                <p id="txt-rut-activo" style="font-size: 18px; font-weight: bold; margin-top: 8px; color: var(--primary);">Ninguno</p>
            </div>
            <div class="card">
                <h4>Estado de la Operación</h4>
                <p id="txt-estado" style="font-size: 18px; font-weight: bold; margin-top: 8px; color: #64748b;">Inactivo</p>
            </div>
        </div>

        <div class="card" style="margin-top: 16px;">
            <h4>Consola de Eventos en Tiempo Real</h4>
            <div id="log-console" class="log-box">Esperando órdenes...</div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        
        // Elementos DOM
        const loginSection = document.getElementById('login-section');
        const panelSection = document.getElementById('panel-section');
        const loginForm = document.getElementById('login-form');
        const btnLogin = document.getElementById('btn-login');
        const btnRunBot = document.getElementById('btn-run-bot');
        const logConsole = document.getElementById('log-console');

        // Manejo del Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const rut = document.getElementById('rut').value.trim();
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('login-alert');

            alertBox.classList.add('hidden');
            btnLogin.disabled = true;
            btnLogin.textContent = 'Verificando...';

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rut, password })
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Error al conectar');
                }

                // Login Exitoso: Saltamos al Panel
                loginSection.classList.add('hidden');
                panelSection.classList.remove('hidden');
                document.getElementById('txt-rut-activo').textContent = rut;
                addLog('Sesión iniciada en el panel. Credenciales listas.');

            } catch (err) {
                alertBox.textContent = err.message;
                alertBox.className = 'alert alert-error';
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = 'Ingresar al Panel';
            }
        });

        // Lanzar el Robot Real en Python
        btnRunBot.addEventListener('click', async () => {
            btnRunBot.disabled = true;
            btnRunBot.textContent = '⏳ Robot Trabajando en SII...';
            document.getElementById('txt-estado').textContent = '🤖 Corriendo';
            document.getElementById('txt-estado').style.color = '#10b981';
            addLog('Iniciando proceso de navegación automatizada...');

            try {
                const response = await fetch(`${API_URL}/api/run-bot`, { method: 'POST' });
                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'El bot falló');

                addLog(`✓ Éxito: ${data.message}`);
                document.getElementById('txt-estado').textContent = '✓ Terminado';
                document.getElementById('txt-estado').style.color = '#10b981';

            } catch (err) {
                addLog(`❌ Error: ${err.message}`);
                document.getElementById('txt-estado').textContent = '❌ Falló';
                document.getElementById('txt-estado').style.color = '#ef4444';
            } finally {
                btnRunBot.disabled = false;
                btnRunBot.textContent = '▶ Ejecutar Bot SII Ahora';
            }
        });

        function addLog(message) {
            const time = new Date().toLocaleTimeString();
            logConsole.innerHTML += `<div>[${time}] ${message}</div>`;
            logConsole.scrollTop = logConsole.scrollHeight;
        }
    </script>
</body>
</html>
